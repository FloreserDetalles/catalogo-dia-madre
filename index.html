<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Floreser Detalles</title>

<style>
body {
  margin: 0;
  font-family: 'Georgia', serif;
  background: #faf7f6;
  color: #333;
}

/* HEADER */
header {
  background: white;
  padding: 40px 20px;
  text-align: center;
  border-bottom: 1px solid #eee;
}

.logo {
  font-size: 34px;
  color: #b76e79;
  letter-spacing: 2px;
}

.slogan {
  font-size: 14px;
  color: #999;
  margin-top: 8px;
}

.links {
  margin-top: 20px;
}

.links a {
  margin: 0 10px;
  text-decoration: none;
  font-size: 14px;
}

.insta {
  color: #c13584;
}

.whatsapp {
  background: #25D366;
  color: white;
  padding: 8px 15px;
  border-radius: 20px;
}

/* SECCIONES */
h2 {
  margin-top: 50px;
  font-weight: normal;
  letter-spacing: 1px;
}

/* PRODUCTOS */
.contenedor {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  padding: 20px;
}

.producto {
  background: white;
  margin: 15px;
  width: 260px;
  border-radius: 12px;
  overflow: hidden;
  transition: transform 0.2s;
}

.producto:hover {
  transform: scale(1.02);
}

.producto img {
  width: 100%;
  height: 300px;
  object-fit: cover;
}

.producto-info {
  padding: 15px;
}

.producto h3 {
  margin: 0;
  font-size: 18px;
}

.precio {
  color: #b76e79;
  margin: 8px 0;
}

button {
  background: #b76e79;
  color: white;
  border: none;
  padding: 8px 12px;
  border-radius: 5px;
  cursor: pointer;
}

/* BOTÓN FLOTANTE */
.flotante {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  color: white;
  padding: 15px;
  border-radius: 50%;
  text-decoration: none;
}
</style>

</head>

<body>

<header>
  <div class="logo">Floreser Detalles</div>
  <div class="slogan">Detalles que enamoran</div>

  <div class="links">
    <a href="https://instagram.com/Floreser_Detalles_" class="insta">Instagram</a>
    <a href="https://wa.me/573247029744" class="whatsapp">WhatsApp</a>
  </div>
</header>

<!-- RAMOS -->
<h2>Ramos</h2>
<div class="contenedor">

  <div class="producto">
    <img src="./002.jpg">
    <div class="producto-info">
      <h3>Ramo de girasoles</h3>
      <div class="precio">Desde $35.000</div>
      <a href="https://wa.me/573247029744?text=Hola quiero un ramo de girasoles">
        <button>Comprar</button>
      </a>
    </div>
  </div>

  <div class="producto">
    <img src="./001.jpg">
    <div class="producto-info">
      <h3>Ramo de rosas</h3>
      <div class="precio">Desde $35.000</div>
      <a href="https://wa.me/573247029744?text=Hola quiero un ramo de rosas">
        <button>Comprar</button>
      </a>
    </div>
  </div>

</div>

<!-- MUGS -->
<h2>Mugs personalizados</h2>
<div class="contenedor">

  <div class="producto">
    <img src="./008.jpg">
    <div class="producto-info">
      <h3>Mug personalizado</h3>
      <div class="precio">Desde $12.000</div>
      <a href="https://wa.me/573247029744?text=Hola quiero un mug personalizado">
        <button>Comprar</button>
      </a>
    </div>
  </div>

</div>

<!-- ANCHETAS -->
<h2>Anchetas</h2>
<div class="contenedor">

  <div class="producto">
    <img src="./004.jpg">
    <div class="producto-info">
      <h3>Desayunos sorpresa y Ancheta personalizadas</h3>
      <div class="precio">Desde $45.000</div>
      <a href="https://wa.me/573247029744?text=Hola quiero una ancheta">
        <button>Comprar</button>
      </a>
    </div>
  </div>

</div>

<a href="https://wa.me/573247029744" class="flotante">💬</a>

</body>
</html>
